paths:
  dataset_dir: ../dataset
  baseline_chart_path: ../baseline_chart.png
  artifacts_dir: artifacts
  outputs_dir: artifacts/outputs
  temp_dir: artifacts/temp
  reports_dir: artifacts/reports

models:
  chart_detector_weights: null
  coral_segmenter_weights: null
  hue_model_path: null
  health_model_path: null
  detection_backbone: ../yolov8n.pt
  segmentation_backbone: ../yolov8n-seg.pt

runtime:
  confidence_threshold: 0.25
  image_size: 640
  device: cpu

phase1:
  class_name: chart
  prepared_dataset_dir: artifacts/outputs/phase1/dataset
  training_dir: artifacts/outputs/phase1/training
  inference_dir: artifacts/outputs/phase1/inference
  val_split: 0.2
  seed: 42
  excluded_image_ids:
    - P8250005
  use_symlinks: true
  skip_unlabeled_images: true
  train:
    run_name: chart_detector
    epochs: 10
    batch_size: 8
    patience: 20
    augment: true
    workers: 0
    plots: false
    prewarm_font_cache: true
    prewarm_dataset: true
    drop_corrupt_samples: true
    sample_timeout_seconds: 15
    warmup_workers: 1
    warmup_log_interval: 1

phase2:
  output_dir: artifacts/outputs/phase2
  baseline_profile_path: artifacts/outputs/phase2/baseline_profile.json
  evaluation_manifest_path: configs/phase2_evaluation_manifest.yaml
  evaluation_reports_dir: artifacts/reports/phase2
  patch_rows: 6
  patch_cols: 4
  cell_sample_ratio: 0.5
  min_patch_count: 8
  method: linear
  sample_timeout_seconds: 20

phase3:
  class_name: coral
  labels_dir: ../data/phase3/labels
  prepared_dataset_dir: artifacts/outputs/phase3/dataset
  training_dir: artifacts/outputs/phase3/training
  inference_dir: artifacts/outputs/phase3/inference
  evaluation_reports_dir: artifacts/reports/phase3
  split_strategy: legacy
  legacy_dataset_dir: ../data/phase3
  val_split: 0.2
  seed: 42
  use_symlinks: true
  train:
    run_name: coral_segmenter
    epochs: 10
    batch_size: 4
    patience: 20
    augment: true
    workers: 0
    plots: false
    prewarm_font_cache: true
    prewarm_dataset: true
    drop_corrupt_samples: true
    sample_timeout_seconds: 15
    warmup_workers: 1
    warmup_log_interval: 1

phase4:
  output_dir: artifacts/outputs/phase4
  features_csv_path: artifacts/outputs/phase4/features.csv
  reports_dir: artifacts/reports/phase4
